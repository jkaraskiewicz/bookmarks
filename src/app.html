<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		%sveltekit.head%
		<script>
			// Applied before first paint so the page never flashes the wrong theme.
			// This has to run before any module loads, so it necessarily restates
			// resolveTheme() and the storage key from src/lib/theme. A test asserts
			// the list and the key below still match the module.
			(() => {
				const THEMES = ['dark', 'light', 'darcula', 'melange'];
				const STORAGE_KEY = 'bookmarks:theme';
				const FALLBACK = 'dark';
				try {
					const stored = localStorage.getItem(STORAGE_KEY);
					const preference = stored === 'system' || THEMES.includes(stored) ? stored : 'system';
					const prefersLight = matchMedia('(prefers-color-scheme: light)').matches;
					document.documentElement.dataset.theme =
						preference === 'system' ? (prefersLight ? 'light' : FALLBACK) : preference;
				} catch {
					document.documentElement.dataset.theme = FALLBACK;
				}
			})();
		</script>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
